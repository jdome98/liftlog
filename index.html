<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lift Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0a;
    --surface: #161616;
    --surface-2: #1f1f1f;
    --border: #2a2a2a;
    --text: #f5f5f5;
    --text-dim: #888;
    --text-faint: #555;
    --accent: #ff5722;
    --accent-dim: #4a1a08;
    --success: #4ade80;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  body {
    padding-bottom: 100px;
  }

  .header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .logo .accent { color: var(--accent); }

  .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .save-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 4px;
  }

  .save-indicator.saved { color: var(--success); }

  .day-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 14px 20px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 87px;
    z-index: 99;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    padding: 10px 16px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .day-tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .day-tab .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    margin-left: 4px;
  }

  .content {
    padding: 20px;
  }

  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 0.02em;
    line-height: 1;
    margin-bottom: 4px;
  }

  .day-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 24px;
  }

  .rest-day {
    text-align: center;
    padding: 60px 20px;
  }

  .rest-day h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    letter-spacing: 0.05em;
    color: var(--accent);
    line-height: 0.9;
    margin-bottom: 16px;
  }

  .rest-day p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
    max-width: 280px;
    margin: 0 auto;
  }

  .exercise {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .exercise-header {
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  .exercise-info { flex: 1; min-width: 0; }

  .exercise-name {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .exercise-target {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .last-weight {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    margin-left: 12px;
    flex-shrink: 0;
    text-align: right;
  }

  .last-weight .label {
    display: block;
    font-size: 9px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }

  .sets {
    border-top: 1px solid var(--border);
    padding: 16px;
    background: var(--surface-2);
    display: none;
  }

  .exercise.expanded .sets { display: block; }

  .sets-header {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 50px;
    gap: 10px;
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .set-row {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 50px;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
  }

  .set-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text-dim);
    text-align: center;
  }

  .set-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    width: 100%;
    text-align: center;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .set-row input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .set-done {
    width: 40px;
    height: 40px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-faint);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-left: auto;
  }

  .set-done.done {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  .history-toggle {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
  }

  .history-toggle:hover { color: var(--text); }

  .history {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    display: none;
  }

  .history.show { display: block; }

  .history-entry {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
  }

  .history-entry .date-col { color: var(--text-faint); }

  .notes {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    margin-top: 24px;
  }

  .notes h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    color: var(--accent);
  }

  .notes ul {
    list-style: none;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .notes li {
    padding: 4px 0;
    padding-left: 16px;
    position: relative;
  }

  .notes li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
  }

  .data-section {
    margin-top: 24px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .data-section h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    color: var(--accent);
  }

  .data-section p {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .data-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .data-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
  }

  .data-btn:hover { border-color: var(--accent); color: var(--accent); }

  .data-btn.danger { color: var(--text-faint); grid-column: 1 / -1; }
  .data-btn.danger:hover { color: var(--accent); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1001;
    padding: 20px;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }

  .modal p {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .modal textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    min-height: 200px;
    resize: vertical;
    border-radius: 0;
  }

  .modal-buttons {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .modal-btn {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
  }

  .modal-btn.primary { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 700; }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--accent);
    color: var(--bg);
    padding: 12px 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    transition: transform 0.3s;
    z-index: 1000;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">LIFT<span class="accent">.</span>LOG</div>
    <div class="date" id="currentDate"></div>
  </div>
  <div class="save-indicator" id="saveIndicator">● Auto-saved</div>
</div>

<div class="day-tabs" id="dayTabs"></div>

<div class="content" id="content">
  <div class="loading">Loading...</div>
</div>

<div class="toast" id="toast">Saved</div>

<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h3>BACKUP YOUR DATA</h3>
    <p>Copy this text and save it somewhere safe (Notes app, email to yourself). You can paste it back to restore your history.</p>
    <textarea id="exportText" readonly></textarea>
    <div class="modal-buttons">
      <button class="modal-btn" onclick="closeModal('exportModal')">CLOSE</button>
      <button class="modal-btn primary" onclick="copyExport()">COPY</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>RESTORE DATA</h3>
    <p>Paste your backup text below. This will overwrite your current data.</p>
    <textarea id="importText" placeholder="Paste backup data here..."></textarea>
    <div class="modal-buttons">
      <button class="modal-btn" onclick="closeModal('importModal')">CANCEL</button>
      <button class="modal-btn primary" onclick="doImport()">RESTORE</button>
    </div>
  </div>
</div>

<script>
  const WORKOUTS = {
    push: {
      name: 'Push',
      subtitle: 'Chest · Shoulders · Triceps',
      day: 'MON',
      exercises: [
        { id: 'sm_bench', name: 'Smith Machine Bench Press', target: '3 × 6–8' },
        { id: 'incline_db', name: 'Incline Dumbbell Press', target: '3 × 8–10' },
        { id: 'sm_shoulder', name: 'Smith Machine Shoulder Press', target: '3 × 8–10' },
        { id: 'cable_fly', name: 'Cable Chest Fly (mid)', target: '3 × 10–12' },
        { id: 'cable_lateral', name: 'Cable Lateral Raise (single arm)', target: '3 × 10–12 ea' },
        { id: 'tri_pushdown', name: 'Tricep Pushdown (rope/bar)', target: '3 × 8–10' },
      ]
    },
    pull: {
      name: 'Pull',
      subtitle: 'Back · Biceps · Rear Delts',
      day: 'TUE',
      exercises: [
        { id: 'lat_pulldown', name: 'Lat Pulldown (standard grip)', target: '3 × 6–8' },
        { id: 'cable_row', name: 'Seated Cable Row', target: '3 × 8–10' },
        { id: 'sm_row', name: 'Smith Machine Bent-Over Row', target: '3 × 8–10' },
        { id: 'face_pull', name: 'Face Pull (cable)', target: '3 × 12–15' },
        { id: 'ez_curl', name: 'EZ Bar Curl', target: '3 × 8–10' },
        { id: 'hammer_curl', name: 'Hammer Curl (cable/DB)', target: '3 × 10–12' },
      ]
    },
    rest_wed: {
      name: 'Rest',
      subtitle: 'Muay Thai + Light Cardio',
      day: 'WED',
      rest: true,
      restMessage: 'Active recovery. Save the lifting for tomorrow.'
    },
    legs: {
      name: 'Legs',
      subtitle: 'Quads · Hams · Glutes · Calves',
      day: 'THU',
      exercises: [
        { id: 'sm_squat', name: 'Smith Machine Squat', target: '3 × 6–8' },
        { id: 'rdl', name: 'Romanian Deadlift (Smith/DB)', target: '3 × 8–10' },
        { id: 'leg_press', name: 'Leg Press', target: '3 × 8–10' },
        { id: 'ham_curl', name: 'Hamstring Curl', target: '3 × 10–12' },
        { id: 'leg_ext', name: 'Leg Extension', target: '3 × 10–12' },
        { id: 'calf', name: 'Calf Raises', target: '3 × 12–15' },
      ]
    },
    pump: {
      name: 'Pump',
      subtitle: 'Upper Body · Lighter, Higher Rep',
      day: 'FRI',
      exercises: [
        { id: 'db_bench', name: 'Dumbbell Bench Press', target: '3 × 10–12' },
        { id: 'lat_close', name: 'Lat Pulldown (close grip)', target: '3 × 10–12' },
        { id: 'cable_fly_pump', name: 'Cable Chest Fly', target: '3 × 10–12' },
        { id: 'preacher', name: 'Preacher Curl', target: '3 × 10–12' },
        { id: 'tri_ext', name: 'Tricep Extension (cable)', target: '3 × 10–12' },
      ]
    },
    abs: {
      name: 'Abs',
      subtitle: 'Core + Cardio · Optional',
      day: 'SAT',
      exercises: [
        { id: 'cable_crunch', name: 'Cable Crunch', target: '3 × 12–15' },
        { id: 'knee_raise', name: 'Hanging Knee Raise', target: '3 × 10–15' },
        { id: 'plank', name: 'Plank (seconds)', target: '3 × 30–60s' },
      ],
      cardioNote: 'Then 20–30 min cardio.'
    },
    rest_sun: {
      name: 'Rest',
      subtitle: 'Full Recovery',
      day: 'SUN',
      rest: true,
      restMessage: 'Full rest day. Eat, sleep, recover.'
    }
  };

  const REMINDERS = [
    'Last 2 reps should feel hard. If not, add weight.',
    'Hit the top of the rep range on all 3 sets? Add 5 lb next session.',
    '60–90 sec rest between sets. Use a timer.',
    'Diet drives fat loss. Lifting preserves muscle.',
    'Session over 60 min? You\'re doing too much.'
  ];

  const STORAGE_KEY = 'liftlog_data_v1';

  let state = {};
  let currentDay = null;
  let storageWorks = false;

  function tryLocalStorage() {
    try {
      const test = '__test__';
      localStorage.setItem(test, test);
      localStorage.removeItem(test);
      return true;
    } catch (e) {
      return false;
    }
  }

  function loadState() {
    storageWorks = tryLocalStorage();
    if (storageWorks) {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          state = JSON.parse(raw);
          return;
        }
      } catch (e) {
        console.error('Load failed:', e);
      }
    }
    state = {};
  }

  function saveState() {
    if (!storageWorks) {
      updateSaveIndicator('warning', '⚠ In-memory only — back up your data');
      return;
    }
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateSaveIndicator('saved', '● Auto-saved');
    } catch (e) {
      updateSaveIndicator('warning', '⚠ Save failed');
      console.error('Save failed:', e);
    }
  }

  function updateSaveIndicator(type, text) {
    const el = document.getElementById('saveIndicator');
    if (el) {
      el.textContent = text;
      el.className = 'save-indicator ' + (type === 'saved' ? 'saved' : '');
    }
  }

  function getExerciseData(exerciseId) {
    if (!state[exerciseId]) {
      state[exerciseId] = { sets: [{w:'',r:'',d:false},{w:'',r:'',d:false},{w:'',r:'',d:false}], history: [] };
    }
    return state[exerciseId];
  }

  function renderDayTabs() {
    const tabs = document.getElementById('dayTabs');
    tabs.innerHTML = Object.entries(WORKOUTS).map(([key, w]) => `
      <button class="day-tab ${key === currentDay ? 'active' : ''}" data-day="${key}">
        ${w.day}<span class="num">${w.name.toUpperCase()}</span>
      </button>
    `).join('');

    tabs.querySelectorAll('.day-tab').forEach(btn => {
      btn.addEventListener('click', () => switchDay(btn.dataset.day));
    });
  }

  function renderContent() {
    const workout = WORKOUTS[currentDay];
    const content = document.getElementById('content');

    if (workout.rest) {
      content.innerHTML = `
        <div class="rest-day">
          <h2>REST</h2>
          <p>${workout.restMessage}</p>
        </div>
      `;
      return;
    }

    const exercisesHtml = workout.exercises.map(ex => {
      const data = getExerciseData(ex.id);
      const lastEntry = data.history[data.history.length - 1];
      const lastWeight = lastEntry ? `${lastEntry.topWeight} lb` : '—';

      const setsHtml = data.sets.map((set, i) => `
        <div class="set-row" data-exercise="${ex.id}" data-set="${i}">
          <div class="set-num">${i+1}</div>
          <input type="number" inputmode="decimal" placeholder="lb" value="${set.w}" data-field="w">
          <input type="number" inputmode="numeric" placeholder="reps" value="${set.r}" data-field="r">
          <button class="set-done ${set.d ? 'done' : ''}" data-field="d">${set.d ? '✓' : '○'}</button>
        </div>
      `).join('');

      const historyHtml = data.history.length > 0
        ? data.history.slice(-5).reverse().map(h => `
            <div class="history-entry">
              <span class="date-col">${h.date}</span>
              <span>${h.summary}</span>
            </div>
          `).join('')
        : '<div class="history-entry"><span>No history yet.</span></div>';

      return `
        <div class="exercise" data-exercise="${ex.id}">
          <div class="exercise-header">
            <div class="exercise-info">
              <div class="exercise-name">${ex.name}</div>
              <div class="exercise-target">${ex.target}</div>
            </div>
            <div class="last-weight">
              <span class="label">Last Top</span>
              ${lastWeight}
            </div>
          </div>
          <div class="sets">
            <div class="sets-header">
              <div></div>
              <div>Weight</div>
              <div>Reps</div>
              <div></div>
            </div>
            ${setsHtml}
            <button class="history-toggle" data-action="toggle-history">View History</button>
            <div class="history">
              ${historyHtml}
            </div>
            <button class="history-toggle" data-action="finish" style="margin-top:8px;border-color:var(--accent);color:var(--accent);">
              Save Session & Reset Sets
            </button>
          </div>
        </div>
      `;
    }).join('');

    const cardioNote = workout.cardioNote
      ? `<p style="color:var(--text-dim);font-size:13px;margin-top:16px;text-align:center;font-style:italic;">${workout.cardioNote}</p>`
      : '';

    content.innerHTML = `
      <h1 class="day-title">${workout.name.toUpperCase()}</h1>
      <div class="day-subtitle">${workout.subtitle}</div>
      ${exercisesHtml}
      ${cardioNote}
      <div class="notes">
        <h3>Reminders</h3>
        <ul>
          ${REMINDERS.map(r => `<li>${r}</li>`).join('')}
        </ul>
      </div>
      <div class="data-section">
        <h3>Data Backup</h3>
        <p>Your data saves automatically to this browser. Back up periodically in case you clear browser data or switch devices.</p>
        <div class="data-buttons">
          <button class="data-btn" id="exportBtn">Export</button>
          <button class="data-btn" id="importBtn">Import</button>
          <button class="data-btn danger" id="resetAllBtn">Clear All Data</button>
        </div>
      </div>
    `;

    attachExerciseListeners();
  }

  function attachExerciseListeners() {
    document.querySelectorAll('.exercise-header').forEach(header => {
      header.addEventListener('click', () => {
        header.parentElement.classList.toggle('expanded');
      });
    });

    document.querySelectorAll('.set-row input').forEach(input => {
      input.addEventListener('change', handleSetChange);
      input.addEventListener('blur', handleSetChange);
    });

    document.querySelectorAll('.set-done').forEach(btn => {
      btn.addEventListener('click', handleSetDone);
    });

    document.querySelectorAll('[data-action="toggle-history"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const history = btn.parentElement.querySelector('.history');
        history.classList.toggle('show');
        btn.textContent = history.classList.contains('show') ? 'Hide History' : 'View History';
      });
    });

    document.querySelectorAll('[data-action="finish"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const exerciseId = btn.closest('.exercise').dataset.exercise;
        finishExercise(exerciseId);
      });
    });

    const exportBtn = document.getElementById('exportBtn');
    if (exportBtn) exportBtn.addEventListener('click', openExport);

    const importBtn = document.getElementById('importBtn');
    if (importBtn) importBtn.addEventListener('click', openImport);

    const resetBtn = document.getElementById('resetAllBtn');
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        if (confirm('Clear ALL workout data and history? This cannot be undone.')) {
          state = {};
          saveState();
          renderContent();
          showToast('Cleared');
        }
      });
    }
  }

  function handleSetChange(e) {
    const row = e.target.closest('.set-row');
    const exerciseId = row.dataset.exercise;
    const setIdx = parseInt(row.dataset.set);
    const field = e.target.dataset.field;
    const data = getExerciseData(exerciseId);
    data.sets[setIdx][field] = e.target.value;
    saveState();
  }

  function handleSetDone(e) {
    e.stopPropagation();
    const row = e.target.closest('.set-row');
    const exerciseId = row.dataset.exercise;
    const setIdx = parseInt(row.dataset.set);
    const data = getExerciseData(exerciseId);
    data.sets[setIdx].d = !data.sets[setIdx].d;
    e.target.classList.toggle('done');
    e.target.textContent = data.sets[setIdx].d ? '✓' : '○';
    saveState();
  }

  function finishExercise(exerciseId) {
    const data = getExerciseData(exerciseId);
    const validSets = data.sets.filter(s => s.w && s.r);
    if (validSets.length === 0) {
      showToast('Log some sets first');
      return;
    }
    const topWeight = Math.max(...validSets.map(s => parseFloat(s.w) || 0));
    const summary = validSets.map(s => `${s.w}×${s.r}`).join(', ');
    const today = new Date();
    const dateStr = `${(today.getMonth()+1).toString().padStart(2,'0')}/${today.getDate().toString().padStart(2,'0')}`;

    data.history.push({ date: dateStr, summary, topWeight });
    if (data.history.length > 30) data.history = data.history.slice(-30);

    data.sets = [{w:'',r:'',d:false},{w:'',r:'',d:false},{w:'',r:'',d:false}];

    saveState();
    renderContent();
    showToast('Logged');
  }

  function switchDay(day) {
    currentDay = day;
    state._lastDay = day;
    saveState();
    renderDayTabs();
    renderContent();
    window.scrollTo(0, 0);
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function setCurrentDate() {
    const today = new Date();
    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    document.getElementById('currentDate').textContent =
      `${days[today.getDay()]} · ${today.getDate()} ${months[today.getMonth()]}`;
  }

  function pickDefaultDay() {
    if (state._lastDay && WORKOUTS[state._lastDay]) {
      return state._lastDay;
    }
    const dayMap = {
      1: 'push',
      2: 'pull',
      3: 'rest_wed',
      4: 'legs',
      5: 'pump',
      6: 'abs',
      0: 'rest_sun'
    };
    return dayMap[new Date().getDay()] || 'push';
  }

  function openExport() {
    const text = JSON.stringify(state);
    document.getElementById('exportText').value = text;
    document.getElementById('exportModal').classList.add('show');
  }

  function openImport() {
    document.getElementById('importText').value = '';
    document.getElementById('importModal').classList.add('show');
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('show');
  }

  function copyExport() {
    const textarea = document.getElementById('exportText');
    textarea.select();
    textarea.setSelectionRange(0, 999999);
    try {
      document.execCommand('copy');
      if (navigator.clipboard) {
        navigator.clipboard.writeText(textarea.value).catch(() => {});
      }
      showToast('Copied');
    } catch (e) {
      showToast('Select & copy manually');
    }
  }

  function doImport() {
    const text = document.getElementById('importText').value.trim();
    if (!text) {
      showToast('Paste data first');
      return;
    }
    try {
      const parsed = JSON.parse(text);
      if (typeof parsed !== 'object' || parsed === null) throw new Error('Invalid format');
      if (!confirm('This will replace your current data. Continue?')) return;
      state = parsed;
      saveState();
      closeModal('importModal');
      renderContent();
      showToast('Restored');
    } catch (e) {
      alert('Invalid backup data. Make sure you copied the entire text from Export.');
    }
  }

  function init() {
    setCurrentDate();
    loadState();
    if (!storageWorks) {
      updateSaveIndicator('warning', '⚠ Storage unavailable — export to backup');
    }
    currentDay = pickDefaultDay();
    renderDayTabs();
    renderContent();
  }

  init();
</script>

</body>
</html>
